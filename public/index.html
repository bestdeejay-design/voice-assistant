<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Голосовой ассистент · Lovii</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --accent:#ef66ff; --text:#e8e8ea; --muted:#8a8f98; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, system-ui, sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 20px; border-bottom:1px solid #262a33; display:flex; align-items:center; gap:10px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); }
  #chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width:78%; padding:12px 14px; border-radius:14px; line-height:1.45; font-size:14px; white-space:pre-wrap; }
  .user { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .bot { align-self:flex-start; background:var(--card); border-bottom-left-radius:4px; }
  .bot .cites { margin-top:8px; font-size:11px; color:var(--muted); border-top:1px solid #2a2e38; padding-top:6px; }
  .bot audio { margin-top:8px; width:100%; }
  .controls { padding:16px 20px; border-top:1px solid #262a33; display:flex; gap:10px; align-items:center; }
  button { background:var(--card); color:var(--text); border:1px solid #2a2e38; padding:11px 16px; border-radius:10px; font-size:14px; cursor:pointer; transition:.15s; }
  button:hover { border-color:var(--accent); }
  button.rec { background:var(--accent); color:#fff; border:none; }
  button.rec.active { background:#ff3b5c; animation:pulse 1s infinite; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #textInput { flex:1; background:var(--bg); color:var(--text); border:1px solid #2a2e38; border-radius:10px; padding:11px 14px; font-size:14px; outline:none; }
  #textInput:focus { border-color:var(--accent); }
  #status { font-size:12px; color:var(--muted); flex:1; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
</style>
</head>
<body>
<header><span class="dot"></span><h1>Голосовой ассистент · база знаний Lovii</h1></header>
<div id="chat"></div>
<div class="controls">
  <button id="recBtn" class="rec">🎙️ Записать</button>
  <input id="textInput" type="text" placeholder="Или напишите вопрос…" autocomplete="off" />
  <button id="sendBtn">➤</button>
  <button id="speakBtn" disabled>🔊 Озвучить</button>
  <span id="status">Готов.</span>
</div>

<script>
const chat = document.getElementById('chat');
const recBtn = document.getElementById('recBtn');
const speakBtn = document.getElementById('speakBtn');
const status = document.getElementById('status');
let mediaRecorder, chunks = [], lastAnswer = '', lastQuestion = '';

function addMsg(role, text, citations) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  if (citations && citations.length) {
    const c = document.createElement('div');
    c.className = 'cites';
    c.textContent = '📚 ' + citations.map(u => u.split('/').pop()).join(', ');
    el.appendChild(c);
  }
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

async function askAudio(blob) {
  status.textContent = 'Распознавание…';
  const fd = new FormData();
  fd.append('audio', blob, 'rec.webm');
  const r = await fetch('/api/ask-audio', { method:'POST', body: blob });
  const j = await r.json();
  if (j.error) { status.textContent = 'Ошибка: ' + j.error; return; }
  lastQuestion = j.question; lastAnswer = j.answer;
  addMsg('user', j.question);
  const bot = addMsg('bot', j.answer, j.citations);
  status.textContent = 'Озвучка…';
  await speak(bot);
  speakBtn.disabled = false;
  status.textContent = 'Готов.';
}

async function askText(text) {
  const r = await fetch('/api/ask', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text}) });
  const j = await r.json();
  lastQuestion = text; lastAnswer = j.answer;
  addMsg('user', text);
  const bot = addMsg('bot', j.answer, j.citations);
  status.textContent = 'Озвучка…';
  await speak(bot);
  speakBtn.disabled = false;
  status.textContent = 'Готов.';
}

async function speak(botEl) {
  const r = await fetch('/api/tts', { method:'POST', body: lastAnswer });
  if (!r.ok) return;
  const blob = await r.blob();
  const url = URL.createObjectURL(blob);
  const audio = document.createElement('audio');
  audio.controls = true; audio.src = url;
  botEl.appendChild(audio);
}

recBtn.onclick = async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    recBtn.classList.remove('active');
    recBtn.textContent = '🎙️ Записать';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
      stream.getTracks().forEach(t => t.stop());
      await askAudio(blob);
    };
    mediaRecorder.start();
    recBtn.classList.add('active');
    recBtn.textContent = '⏹ Остановить';
    status.textContent = 'Говорите…';
  } catch (e) {
    status.textContent = 'Нет доступа к микрофону: ' + e.message;
  }
};

speakBtn.onclick = () => {
  if (lastAnswer) speak(addMsg('bot', lastAnswer));
};

const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');

function sendText() {
  const t = textInput.value.trim();
  if (!t) return;
  textInput.value = '';
  askText(t);
}

sendBtn.onclick = sendText;
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendText();
});
</script>
</body>
</html>
