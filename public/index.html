<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🎙️ Voice Assistant</title>
<style>
  :root { --bg:#0f1115; --panel:#1a1d24; --accent:#5b8cff; --txt:#e6e9ef; --muted:#8b93a7; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--txt); height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 18px; background:var(--panel); display:flex; align-items:center; gap:12px; border-bottom:1px solid #262a33; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  #rec { background:var(--accent); color:#fff; border:none; padding:10px 18px; border-radius:10px; font-size:15px; cursor:pointer; }
  #rec.active { background:#e0483f; animation:pulse 1s infinite; }
  @keyframes pulse { 50% { opacity:.6; } }
  #chat { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:80%; padding:12px 14px; border-radius:12px; line-height:1.45; white-space:pre-wrap; }
  .q { align-self:flex-end; background:var(--accent); color:#fff; }
  .a { align-self:flex-start; background:var(--panel); border:1px solid #2a2f3a; }
  .a .src { color:var(--muted); font-size:12px; margin-top:6px; }
  .a .play { margin-top:8px; background:#262a33; color:var(--txt); border:1px solid #353b47; border-radius:8px; padding:6px 10px; cursor:pointer; font-size:13px; }
  footer { padding:12px 18px; background:var(--panel); border-top:1px solid #262a33; display:flex; gap:10px; }
  #text { flex:1; background:#0f1115; border:1px solid #2a2f3a; color:var(--txt); border-radius:10px; padding:10px 12px; font-size:14px; }
  #send { background:var(--accent); color:#fff; border:none; padding:10px 16px; border-radius:10px; cursor:pointer; }
  #status { color:var(--muted); font-size:12px; padding:0 18px 8px; }
</style>
</head>
<body>
<header>
  <h1>🎙️ Voice Assistant</h1>
  <button id="rec">● Записать</button>
</header>
<div id="status">Говорите после нажатия «Записать»</div>
<div id="chat"></div>
<footer>
  <input id="text" placeholder="Или напишите вопрос и нажмите Enter…" />
  <button id="send">➤</button>
</footer>

<script>
const chat = document.getElementById('chat');
const recBtn = document.getElementById('rec');
const statusEl = document.getElementById('status');
const textInput = document.getElementById('text');
const sendBtn = document.getElementById('send');

function addMsg(cls, text, citations) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  if (citations) {
    const src = document.createElement('div');
    src.className = 'src';
    src.textContent = '📚 ' + citations.join(', ');
    div.appendChild(src);
    const play = document.createElement('button');
    play.className = 'play';
    play.textContent = '🔊 Озвучить';
    play.onclick = () => fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
    div.appendChild(play);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

let mediaRecorder, chunks = [];
let listening = false;

recBtn.onclick = async () => {
  if (!listening) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
      statusEl.textContent = 'Распознавание…';
      const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
      const buf = await blob.arrayBuffer();
      const resp = await fetch('/api/ask-audio', { method:'POST', body: buf });
      const data = await resp.json();
      if (data.error) { statusEl.textContent = 'Ошибка: ' + data.error; return; }
      addMsg('q', data.question);
      addMsg('a', data.text, data.citations);
      statusEl.textContent = 'Готово. Можно говорить снова.';
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    listening = true;
    recBtn.classList.add('active');
    recBtn.textContent = '■ Стоп';
    statusEl.textContent = '● Идёт запись… говорите.';
  } else {
    mediaRecorder.stop();
    listening = false;
    recBtn.classList.remove('active');
    recBtn.textContent = '● Записать';
  }
};

async function sendText() {
  const q = textInput.value.trim();
  if (!q) return;
  statusEl.textContent = 'Поиск ответа…';
  const resp = await fetch('/api/ask', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text: q }) });
  const data = await resp.json();
  addMsg('q', q);
  addMsg('a', data.text, data.citations);
  textInput.value = '';
  statusEl.textContent = 'Готово.';
}
sendBtn.onclick = sendText;
textInput.onkeydown = e => { if (e.key === 'Enter') sendText(); };
</script>
</body>
</html>
