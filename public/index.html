<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🎙️ Voice Assistant</title>
<style>
  :root { --bg:#0f1115; --panel:#1a1d24; --accent:#5b8cff; --txt:#e6e9ef; --muted:#8b93a7; --err:#e0483f; --ok:#3fae5a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--txt); height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 18px; background:var(--panel); display:flex; align-items:center; gap:10px; flex-wrap:wrap; border-bottom:1px solid #262a33; }
  header h1 { font-size:16px; margin:0; font-weight:600; flex:1; }
  button { border:none; padding:10px 16px; border-radius:10px; font-size:14px; cursor:pointer; color:#fff; }
  #rec { background:var(--accent); }
  #rec.active { background:var(--err); animation:pulse 1s infinite; }
  #test { background:#353b47; }
  @keyframes pulse { 50% { opacity:.6; } }
  #chat { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:80%; padding:12px 14px; border-radius:12px; line-height:1.45; white-space:pre-wrap; word-wrap:break-word; }
  .q { align-self:flex-end; background:var(--accent); color:#fff; }
  .a { align-self:flex-start; background:var(--panel); border:1px solid #2a2f3a; }
  .a .src { color:var(--muted); font-size:12px; margin-top:6px; }
  .a .play { margin-top:8px; background:#262a33; color:var(--txt); border:1px solid #353b47; border-radius:8px; padding:6px 10px; cursor:pointer; font-size:13px; }
  footer { padding:12px 18px; background:var(--panel); border-top:1px solid #262a33; display:flex; gap:10px; }
  #text { flex:1; background:#0f1115; border:1px solid #2a2f3a; color:var(--txt); border-radius:10px; padding:10px 12px; font-size:14px; }
  #send { background:var(--accent); }
  #status { color:var(--muted); font-size:13px; padding:8px 18px; min-height:18px; }
  #status.err { color:var(--err); }
  #status.ok { color:var(--ok); }
  #diag { color:var(--muted); font-size:11px; padding:2px 18px 8px; white-space:pre-wrap; opacity:.8; }
</style>
</head>
<body>
<header>
  <h1>🎙️ Voice Assistant</h1>
  <button id="test">🎤 Тест микрофона</button>
  <button id="rec">● Записать</button>
</header>
<div id="status">Загрузка…</div>
<div id="diag"></div>
<div id="chat"></div>
<footer>
  <input id="text" placeholder="Напишите вопрос и нажмите Enter…" />
  <button id="send">➤</button>
</footer>

<script>
const chat = document.getElementById('chat');
const recBtn = document.getElementById('rec');
const testBtn = document.getElementById('test');
const statusEl = document.getElementById('status');
const diagEl = document.getElementById('diag');
const textInput = document.getElementById('text');
const sendBtn = document.getElementById('send');

const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
function log(...a){ diagEl.textContent = a.map(x=>typeof x==='string'?x:JSON.stringify(x)).join(' '); }
function setStatus(t, kind){ statusEl.textContent = t; statusEl.className = kind || ''; }

setStatus('Готово. Попробуйте «🎤 Тест микрофона» или напишите вопрос.');
log('URL:', location.href, '\nisLocalhost:', isLocalhost,
    '\ngetUserMedia:', typeof navigator.mediaDevices?.getUserMedia,
    '\nMediaRecorder:', typeof MediaRecorder,
    '\nsecureContext:', window.isSecureContext);

function addMsg(cls, text, citations) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  if (citations) {
    const src = document.createElement('div');
    src.className = 'src';
    src.textContent = '📚 ' + citations.join(', ');
    div.appendChild(src);
    const play = document.createElement('button');
    play.className = 'play';
    play.textContent = '🔊 Озвучить';
    play.onclick = () => fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text }) }).catch(e=>log('tts err', e.message));
    div.appendChild(play);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

let mediaRecorder, chunks = [], listening = false, stream = null;

async function getMic() {
  if (!navigator.mediaDevices?.getUserMedia) throw new Error('getUserMedia не поддерживается (нужен localhost/https)');
  if (!isLocalhost) throw new Error('Не localhost — браузер блокирует микрофон. Откройте http://localhost:3000');
  return await navigator.mediaDevices.getUserMedia({ audio: true });
}

testBtn.onclick = async () => {
  setStatus('Проверяю микрофон…');
  try {
    const s = await getMic();
    setStatus('✅ Микрофон работает. Можно записывать.', 'ok');
    s.getTracks().forEach(t => t.stop());
  } catch (e) {
    setStatus('❌ Микрофон: ' + e.message, 'err');
    log('mic test error:', e.name, e.message);
  }
};

recBtn.onclick = async () => {
  try {
    if (!listening) {
      setStatus('Запрашиваю микрофон…');
      stream = await getMic();
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        try {
          setStatus('Распознавание…');
          const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          const buf = await blob.arrayBuffer();
          if (!buf.byteLength) { setStatus('Пустая запись. Попробуйте ещё раз.', 'err'); return; }
          const resp = await fetch('/api/ask-audio', { method:'POST', body: buf });
          const data = await resp.json();
          if (data.error) { setStatus('Ошибка: ' + data.error, 'err'); return; }
          addMsg('q', data.question || '(не распознано)');
          addMsg('a', data.text, data.citations);
          setStatus('Готово. Можно говорить снова.');
        } catch (e) { setStatus('Ошибка распознавания: ' + e.message, 'err'); }
        finally { if (stream) stream.getTracks().forEach(t => t.stop()); }
      };
      mediaRecorder.start();
      listening = true;
      recBtn.classList.add('active');
      recBtn.textContent = '■ Стоп';
      setStatus('● Идёт запись… говорите.');
    } else {
      mediaRecorder.stop();
      listening = false;
      recBtn.classList.remove('active');
      recBtn.textContent = '● Записать';
    }
  } catch (e) {
    setStatus('❌ Микрофон: ' + e.message, 'err');
    log('rec error:', e.name, e.message);
    listening = false;
    recBtn.classList.remove('active');
    recBtn.textContent = '● Записать';
  }
};

async function sendText() {
  const q = textInput.value.trim();
  if (!q) return;
  try {
    setStatus('Поиск ответа…');
    const resp = await fetch('/api/ask', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text: q }) });
    const data = await resp.json();
    addMsg('q', q);
    addMsg('a', data.text, data.citations);
    textInput.value = '';
    setStatus('Готово.');
  } catch (e) { setStatus('Ошибка: ' + e.message, 'err'); }
}
sendBtn.onclick = sendText;
textInput.onkeydown = e => { if (e.key === 'Enter') sendText(); };
</script>
</body>
</html>
